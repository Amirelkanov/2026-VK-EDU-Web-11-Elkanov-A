{% extends 'base.html' %}

{% block title %}Login - AskPupkin{% endblock %}

{% block content %}
<h1 class="fs-3 fw-bold mb-3">Log In</h1>

<form method="post" action="{% url 'core:login' %}" class="d-flex flex-column gap-3">
  {% csrf_token %}
  <div class="row align-items-center">
    <label class="col-sm-3 col-form-label">Login</label>
    <div class="col-sm-6">
      <input type="text" class="form-control" name="login" placeholder="Enter your login here" />
    </div>
  </div>

  <div class="row align-items-center">
    <label class="col-sm-3 col-form-label">Password</label>
    <div class="col-sm-6">
      <input type="password" class="form-control" name="password" />
    </div>
  </div>

  <div class="row mt-1">
    <div class="col-sm-6 offset-sm-3">
      <button type="submit" class="btn btn-primary">Log in!</button>
    </div>
  </div>

  <div class="row">
    <div class="col-sm-6 offset-sm-3">
      <a href="{% url 'core:signup' %}" class="text-primary">
        Create new account
      </a>
    </div>
  </div>
</form>
{% endblock %}
