<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AskPupkin</title>

  <link rel="icon" href="static/img/favicon.svg" />

  <link rel="stylesheet" href="static/css/bootstrap.min.css" />

  <link rel="stylesheet" href="static/css/layout.css" />
  <link rel="stylesheet" href="static/css/components.css" />
  <link rel="stylesheet" href="static/css/tags.css" />
</head>

<body>
  <!-- Header -->
  <header class="bg-white border-bottom shadow-sm">
    <div class="container py-2">
      <div class="d-flex flex-wrap align-items-center gap-2 gap-sm-3">
        <a href="index.html"
          class="navbar-brand-logo me-3 flex-shrink-0 fs-3 fw-bold text-decoration-none user-select-none text-primary">
          <span class="text-black">Ask</span>Pupkin
        </a>

        <div class="search-container">
          <input type="search" class="form-control search-input" placeholder="Search..." />
          <img src="static/img/search.svg" alt="Search" class="search-icon" />
        </div>
        <a href="ask.html" class="btn btn-success flex-shrink-0">ASK!</a>

        <div class="d-flex align-items-center gap-2 ms-auto">
          <!-- Authorized user -->
          <div class="d-flex align-items-center gap-2">
            <div class="avatar-placeholder small">DR</div>

            <div class="d-flex d-sm-none flex-column">
              <a href="settings.html" title="Settings">
                <img src="static/img/gear.svg" alt="Settings" />
              </a>
              <a href="login.html" title="Log out">
                <img src="static/img/exit.svg" alt="Log out" />
              </a>
            </div>
          </div>

          <div class="d-none d-sm-block">
            <div class="fw-semibold">Dr. Pepper</div>
            <div class="d-flex gap-2 small">
              <a href="settings.html" class="text-primary text-decoration-none">Settings</a>
              <a href="login.html" class="text-danger text-decoration-none">Log out</a>
            </div>
          </div>

          <!-- Unauthorized user -->
          <!-- 
            <a href="login.html" class="btn btn-outline-primary">Log in</a>
            <a href="signup.html" class="btn btn-outline-secondary">Sign up</a>
            -->
        </div>
      </div>
    </div>
  </header>

  <!-- Content -->
  <main>
    <div class="container py-4">
      <div class="row g-4">
        <!-- Main content  -->
        <div class="col-12 col-lg-8">CONTENT</div>

        <!-- Sidebar -->
        <aside class="col-12 col-lg-4">

          <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
              <h2 class="fs-5 fw-bold mb-3">Popular tags</h2>
              <div class="d-flex flex-wrap gap-2">
                <a class="tag">perl</a>
                <a class="tag fw-semibold" style="color: red">python</a>
                <a class="tag">TechnoPark</a>
                <a class="tag fw-semibold" style="color: red">MySQL</a>
                <a class="tag fw-semibold" style="color: green">django</a>
                <a class="tag">Mail.Ru</a>
                <a class="tag">Voloshin</a>
                <a class="tag" style="color: orange">Firefox</a>
              </div>
            </div>
          </div>

          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <h2 class="fs-5 fw-bold mb-3">Best Members</h2>
              <ul class="list-unstyled mb-0 d-flex flex-column gap-2">
                <li class="d-flex align-items-center gap-2 fs-6 fw-semibold">
                  <a href="#">Mr. Freeman</a>
                </li>
                <li class="d-flex align-items-center gap-2 fs-6 fw-semibold">
                  <a href="#">Dr. House</a>
                </li>
                <li class="d-flex align-items-center gap-2 fs-6 fw-semibold">
                  <a href="#">Bender</a>
                </li>
                <li class="d-flex align-items-center gap-2 fs-6 fw-semibold">
                  <a href="#">Queen Victoria</a>
                </li>
                <li class="d-flex align-items-center gap-2 fs-6 fw-semibold">
                  <a href="#">V Pupkin</a>
                </li>
              </ul>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-light border-top">
    <div class="container py-3">
      <div class="d-flex justify-content-between align-items-center text-muted small">
        <span>&copy; 2026 AskPupkin - just ask!</span>
        <div class="d-flex column-gap-3 flex-wrap text-end">
          <a href="#" class="text-secondary">About us</a>
          <a href="#" class="text-secondary">Contacts</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="static/js/bootstrap.bundle.min.js"></script>
</body>

</html>
